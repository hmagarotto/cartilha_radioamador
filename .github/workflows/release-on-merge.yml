name: Release on push to main

on:
  push:
    branches: [ main ]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.1
        bundler-cache: true # runs 'bundle install' and caches installed gems automatically

    - name: Build release assets
      run: bundle exec rake book:build

    - name: Compute tag name
      id: compute-tag
      run: |
        echo Computing next tag number
        LASTPATCH=$(git describe --tags | cut -d- -f1 | cut -d. -f3)
        PATCH=$(($LASTPATCH+1))
        echo "tagname=1.0.${PATCH}" >> $GITHUB_OUTPUT

    - name: Create release
      uses: ncipollo/release-action@v1
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        tag: ${{ steps.compute-tag.outputs.tagname }}
        commit: main
        artifacts: 'cartilha_radioamador.epub,cartilha_radioamador.fb2.zip,cartilha_radioamador.html,cartilha_radioamador.mobi,cartilha_radioamador.pdf,cartilha_radioamador_ext.epub,cartilha_radioamador_ext.fb2.zip,cartilha_radioamador_ext.html,cartilha_radioamador_ext.mobi,cartilha_radioamador_ext.pdf,cartilha_radioamador_fix.epub,cartilha_radioamador_fix.fb2.zip,cartilha_radioamador_fix.html,cartilha_radioamador_fix.mobi,cartilha_radioamador_fix.pdf'
